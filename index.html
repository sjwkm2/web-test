<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개인 명함</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #6366f1;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 64px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(99,102,241,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 16px;
      background: linear-gradient(135deg, #c7e8ff 0%, #e8f4ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      border: 3px solid var(--accent);
      overflow: hidden;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.2);
    }

    .name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 999px;
      letter-spacing: 1px;
      margin-bottom: 32px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 auto 32px;
      width: 60px;
    }

    .info-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .info-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 10px;
      padding: 12px 18px;
      text-align: left;
    }

    .info-list .icon {
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .info-list .label {
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 2px;
    }

    .info-list .value {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .skills {
      margin-top: 28px;
      text-align: left;
    }

    .skills-label {
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .skills-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .skills-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      letter-spacing: 0.3px;
    }

    .tag-lang  { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
    .tag-db    { background: rgba(245,158,11,0.12);  color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .tag-infra { background: rgba(16,185,129,0.12);  color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
    .tag-gis   { background: rgba(236,72,153,0.12);  color: #f9a8d4; border: 1px solid rgba(236,72,153,0.3); }

    .footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">
      <!-- Ghibli-style character with glasses -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="110" height="110">
        <!-- Sky background -->
        <rect width="110" height="110" fill="#c9e8f7"/>
        <!-- Soft cloud behind head -->
        <ellipse cx="55" cy="30" rx="38" ry="32" fill="#e8f6ff" opacity="0.6"/>

        <!-- Neck -->
        <rect x="44" y="74" width="22" height="18" rx="8" fill="#f5c9a0"/>
        <!-- Shirt / collar -->
        <ellipse cx="55" cy="100" rx="30" ry="14" fill="#5b7fa6"/>
        <rect x="25" y="95" width="60" height="15" fill="#5b7fa6"/>
        <!-- Shirt collar white -->
        <polygon points="48,92 55,105 62,92 58,92 55,100 52,92" fill="#e8f0fb"/>

        <!-- Face -->
        <ellipse cx="55" cy="60" rx="26" ry="29" fill="#f8d5a8"/>
        <!-- Ear left -->
        <ellipse cx="29" cy="62" rx="5" ry="7" fill="#f8d5a8"/>
        <!-- Ear right -->
        <ellipse cx="81" cy="62" rx="5" ry="7" fill="#f8d5a8"/>
        <!-- Ear inner -->
        <ellipse cx="29" cy="62" rx="3" ry="4.5" fill="#f0b88a"/>
        <ellipse cx="81" cy="62" rx="3" ry="4.5" fill="#f0b88a"/>

        <!-- Hair top - Ghibli style dark, slightly wavy -->
        <ellipse cx="55" cy="38" rx="27" ry="16" fill="#2c2118"/>
        <rect x="28" y="38" width="54" height="12" fill="#2c2118"/>
        <!-- Hair side left -->
        <ellipse cx="32" cy="52" rx="8" ry="14" fill="#2c2118"/>
        <!-- Hair side right -->
        <ellipse cx="78" cy="52" rx="8" ry="14" fill="#2c2118"/>
        <!-- Hair back top highlight -->
        <ellipse cx="55" cy="36" rx="18" ry="8" fill="#3d3020" opacity="0.5"/>

        <!-- Eyebrows -->
        <path d="M40 54 Q45 51 50 53" stroke="#2c2118" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M60 53 Q65 51 70 54" stroke="#2c2118" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- Eyes whites -->
        <ellipse cx="45" cy="60" rx="7" ry="6.5" fill="white"/>
        <ellipse cx="65" cy="60" rx="7" ry="6.5" fill="white"/>
        <!-- Irises -->
        <ellipse cx="45" cy="61" rx="4.5" ry="4.5" fill="#4a3728"/>
        <ellipse cx="65" cy="61" rx="4.5" ry="4.5" fill="#4a3728"/>
        <!-- Pupils -->
        <ellipse cx="45.5" cy="61" rx="2.5" ry="2.8" fill="#1a1108"/>
        <ellipse cx="65.5" cy="61" rx="2.5" ry="2.8" fill="#1a1108"/>
        <!-- Eye shine -->
        <ellipse cx="47" cy="59" rx="1.2" ry="1.2" fill="white"/>
        <ellipse cx="67" cy="59" rx="1.2" ry="1.2" fill="white"/>

        <!-- Glasses frames - round Ghibli style -->
        <circle cx="45" cy="61" r="9" fill="none" stroke="#4a3010" stroke-width="2.2"/>
        <circle cx="65" cy="61" r="9" fill="none" stroke="#4a3010" stroke-width="2.2"/>
        <!-- Glasses bridge -->
        <path d="M54 61 Q55 59.5 56 61" stroke="#4a3010" stroke-width="2" fill="none"/>
        <!-- Glasses temples -->
        <line x1="36" y1="59" x2="30" y2="57" stroke="#4a3010" stroke-width="2" stroke-linecap="round"/>
        <line x1="74" y1="59" x2="80" y2="57" stroke="#4a3010" stroke-width="2" stroke-linecap="round"/>
        <!-- Lens glare -->
        <path d="M39 56 Q40 55 42 56" stroke="white" stroke-width="1" fill="none" opacity="0.7" stroke-linecap="round"/>
        <path d="M59 56 Q60 55 62 56" stroke="white" stroke-width="1" fill="none" opacity="0.7" stroke-linecap="round"/>

        <!-- Nose -->
        <path d="M53 67 Q55 70 57 67" stroke="#d4956a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Mouth - gentle smile -->
        <path d="M48 76 Q55 81 62 76" stroke="#c07a5a" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Cheek blush -->
        <ellipse cx="38" cy="71" rx="5" ry="3" fill="#f0a090" opacity="0.35"/>
        <ellipse cx="72" cy="71" rx="5" ry="3" fill="#f0a090" opacity="0.35"/>
      </svg>
    </div>
    <div class="name">송*우</div>
    <span class="badge">과 장</span>
    <hr class="divider" />
    <ul class="info-list">
      <li>
        <span class="icon">🏢</span>
        <div>
          <div class="label">소속</div>
          <div class="value">한전KDN</div>
        </div>
      </li>
      <li>
        <span class="icon">📧</span>
        <div>
          <div class="label">이메일</div>
          <div class="value">s*****_**@kdn.com</div>
        </div>
      </li>
      <li>
        <span class="icon">💼</span>
        <div>
          <div class="label">직급</div>
          <div class="value">과장</div>
        </div>
      </li>
      <li>
        <span class="icon">📱</span>
        <div>
          <div class="label">연락처</div>
          <div class="value">010-****-****</div>
        </div>
      </li>
    </ul>
    <div class="skills">
      <div class="skills-label">🛠 기술 스택</div>
      <div class="skills-tags">
        <span class="tag tag-lang">Java</span>
        <span class="tag tag-lang">JSP</span>
        <span class="tag tag-lang">CSS</span>
        <span class="tag tag-gis">ArcGIS</span>
        <span class="tag tag-db">Oracle</span>
        <span class="tag tag-db">MySQL</span>
        <span class="tag tag-db">MariaDB</span>
        <span class="tag tag-infra">Unix</span>
        <span class="tag tag-infra">JEUS</span>
      </div>
    </div>
    <p class="footer">풀스택 바이브코딩 실습 프로젝트</p>
  </div>
</body>
</html>
